kind = "web"
previewPath = "/"
title = "BAC MASTER CI"
version = "1.0.0"
id = "artifacts/bac-master-ci"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20868

[services.development]
run = "pnpm --filter @workspace/bac-master-ci run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bac-master-ci", "run", "build" ]
publicDir = "artifacts/bac-master-ci/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20868"
BASE_PATH = "/"
