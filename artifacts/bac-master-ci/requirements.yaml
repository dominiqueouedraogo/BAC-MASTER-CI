packages:
  "framer-motion": "For fluid page transitions, layout animations, and micro-interactions"
  "recharts": "For rendering beautiful progress charts and admin statistics"
  "react-markdown": "For rendering rich lesson content and explanations safely"
  "date-fns": "For formatting dates in reviews, exams, and histories"
  "clsx": "For conditional class name merging"
  "tailwind-merge": "For merging tailwind classes without conflicts"
  "react-confetti": "For gamification celebrations when earning badges or passing exams"

images:
  - path: "artifacts/bac-master-ci/public/images/hero-bg.png"
    description: "A stunning, abstract, modern 3D gradient mesh background. Deep royal blue and vibrant emerald green colors blending smoothly. Glowing geometric shapes subtly floating, representing education, science, and math. High quality, clean, professional, soft lighting."
    aspect_ratio: "16:9"
  - path: "artifacts/bac-master-ci/public/images/logo-mark.png"
    description: "A clean, modern, minimalist logo mark for an education app called 'BAC MASTER CI'. Incorporates a graduation cap and an upward trending arrow. Colors: royal blue and emerald green. Transparent background, bold, highly legible."
    aspect_ratio: "1:1"
  - path: "artifacts/bac-master-ci/public/images/premium-badge.png"
    description: "A beautiful, glowing 3D golden star or shield badge, representing a 'Premium' status. Elegant reflections, polished look, transparent background."
    aspect_ratio: "1:1"
  - path: "artifacts/bac-master-ci/public/images/methodology-hero.png"
    description: "An aesthetic illustration of a student organizing their study schedule. Modern flat vector art style, vibrant royal blue and green accents. Books, a clock, and a glowing lightbulb."
    aspect_ratio: "16:9"

notes:
  - "The app assumes all API requests go to `/api/*`."
  - "JWT auth is implemented via a global `window.fetch` interceptor in main.tsx to ensure all generated API client hooks automatically attach the `Authorization: Bearer <token>` header."
  - "React Query hooks and types are imported from `@workspace/api-client-react`."
